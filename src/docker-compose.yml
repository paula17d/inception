services:
  nginx:
    build:
      context: ./requirements/nginx
      dockerfile: Dockerfile
    image: nginx_image
    container_name: nginx_container
    ports: 
      - "443:443"

  wordpress:
    build:
      context: ./requirements/wordpress
      dockerfile: Dockerfile
    image: wordpress_image1
    container_name: wordpress_container1
    volumes:
      - wp-volume:/var/www/wordpress
    restart: unless-stopped

volumes:
  wp-volume:
    driver_opts:
      o: bind
      type: none
      device: /home/paula/inception/wordpress_volume
