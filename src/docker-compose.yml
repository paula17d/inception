services:
  nginx:
    build:
      context: ./requirements/nginx
      dockerfile: Dockerfile
    image: nginx_image99999
    container_name: nginx_container99999
    depends_on:
      - mariadb
    ports: 
      - "443:443"
    volumes:
      - wp-volume:/var/www/html
    networks:
      inception:
    restart: unless-stopped

  wordpress:
    build:
      context: ./requirements/wordpress
      dockerfile: Dockerfile
    image: wordpress_image99999
    container_name: wordpress
    depends_on:
      - mariadb
    volumes:
      - wp-volume:/var/www/html
    networks:
      inception:
    restart: unless-stopped

  mariadb:
    build:
      context: ./requirements/mariadb
      dockerfile: Dockerfile
    image: mariadb_image
    container_name: mariadb
    volumes:
      - db-volume:/var/lib/mysql
    networks:
      inception:
    restart: unless-stopped

volumes:
  wp-volume:
    driver_opts:
      o: bind
      type: none
      device: /home/paula/inception_final/wordpress_volume1
  db-volume:
    driver_opts:
      o: bind
      type: none
      device: /home/paula/inception_final/mariadb_volume1

networks:
  inception:
    driver: bridge
